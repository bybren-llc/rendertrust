# Alembic Configuration File
#
# This file is used by Alembic for database migration management.
# The sqlalchemy.url is overridden at runtime from environment variables
# in alembic/env.py.

[alembic]
script_location = alembic
prepend_sys_path = .

# Template for new migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate long revision identifiers in filenames
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
revision_environment = false

# Timezone for migration file timestamps
timezone = UTC

# Placeholder URL; overridden by env.py from DATABASE_URL env var
sqlalchemy.url = postgresql+asyncpg://rendertrust:rendertrust_dev@localhost:5432/rendertrust

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
