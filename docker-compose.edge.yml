# docker-compose.edge.yml — Run a RenderTrust edge node
#
# Usage:
#   GATEWAY_URL=ws://gateway:8000/api/v1 NODE_JWT=<token> \
#     docker compose -f docker-compose.edge.yml up -d

services:
  edge-node:
    build:
      context: .
      dockerfile: edgekit/Dockerfile
    environment:
      - GATEWAY_URL=${GATEWAY_URL:?GATEWAY_URL is required}
      - NODE_JWT=${NODE_JWT:?NODE_JWT is required}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HEALTH_PORT=8081
    ports:
      - "8081:8081"
    volumes:
      - ./edgekit/data:/data
      - ./edgekit/config:/config
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
