# RenderTrust CI Pipeline
# Enforces code quality gates on all PRs and pushes to dev
# Reference: patterns_library/ci/github-actions-workflow.md
name: CI

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Stage 1: Code Quality (fast, runs first)
  # ──────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy core/

  # ──────────────────────────────────────────────────────────────
  # Stage 2: Tests (depends on lint passing)
  # ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -m "not integration and not e2e" --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 7

  integration-tests:
    name: Integration Tests
    needs: [lint]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rendertrust
          POSTGRES_PASSWORD: rendertrust_test
          POSTGRES_DB: rendertrust_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rendertrust"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://rendertrust:rendertrust_test@localhost:5432/rendertrust_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: testing
      SECRET_KEY: test-secret-key-not-for-production
      JWT_SECRET_KEY: test-jwt-secret-not-for-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run integration tests
        run: pytest tests/ -v --tb=short -m "integration" --junitxml=integration-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results
          path: integration-results.xml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Stage 3: Build (depends on tests)
  # ──────────────────────────────────────────────────────────────
  build:
    name: Docker Build
    needs: [unit-tests, type-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: rendertrust/core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
