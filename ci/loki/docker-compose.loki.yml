# Docker Compose stack for Loki + Promtail + Grafana.
# Provides structured log aggregation and visualization for RenderTrust.
#
# Usage:
#   docker compose -f ci/loki/docker-compose.loki.yml up -d
#
# Requires the external network 'rendertrust-net' to exist.
# Create it with:
#   docker network create rendertrust-net

services:
  loki:
    image: grafana/loki:2.9.10
    container_name: rendertrust-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - rendertrust-net

  promtail:
    image: grafana/promtail:2.9.10
    container_name: rendertrust-promtail
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - rendertrust-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: rendertrust-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=rendertrust
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - rendertrust-net

volumes:
  loki_data:
    driver: local
  grafana_data:
    driver: local

networks:
  rendertrust-net:
    external: true
