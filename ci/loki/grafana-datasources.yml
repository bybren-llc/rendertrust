#
# Grafana auto-provisioning: Loki datasource.
# Mounted into Grafana at /etc/grafana/provisioning/datasources/datasources.yml

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
