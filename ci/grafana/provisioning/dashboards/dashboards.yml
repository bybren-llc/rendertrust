#
# Grafana auto-provisioning: dashboard provider.
# Automatically loads JSON dashboard files from the configured path.

apiVersion: 1

providers:
  - name: "RenderTrust Dashboards"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
