#
# Grafana notification provisioning for RenderTrust alerting.
# Place this file in Grafana's provisioning/alerting/ directory.
#
# Environment variables required:
#   DISCORD_WEBHOOK_URL  - Discord channel webhook URL
#   SMTP_HOST            - SMTP server hostname
#   SMTP_FROM            - Sender email address

apiVersion: 1

contactPoints:
  - orgId: 1
    name: discord-alerts
    receivers:
      - uid: discord-webhook
        type: discord
        settings:
          url: "${DISCORD_WEBHOOK_URL}"
          message: |
            **{{ .Status | toUpper }}** {{ .CommonLabels.alertname }}
            Severity: {{ .CommonLabels.severity }}
            {{ range .Alerts }}
            - {{ .Annotations.summary }}
            {{ end }}
        disableResolveMessage: false

  - orgId: 1
    name: email-alerts
    receivers:
      - uid: email-critical
        type: email
        settings:
          addresses: "${ALERT_EMAIL_ADDRESSES}"
          singleEmail: true
          message: |
            Alert: {{ .CommonLabels.alertname }}
            Severity: {{ .CommonLabels.severity }}

            {{ range .Alerts }}
            Summary: {{ .Annotations.summary }}
            Description: {{ .Annotations.description }}
            {{ end }}
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: discord-alerts
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical alerts go to both Discord and Email
      - receiver: discord-alerts
        matchers:
          - severity = critical
        continue: true
      - receiver: email-alerts
        matchers:
          - severity = critical
        continue: false
      # Warning alerts go to Discord only
      - receiver: discord-alerts
        matchers:
          - severity = warning
        continue: false
