# Prometheus scrape configuration for RenderTrust.
# Collects application metrics from /metrics and Prometheus self-metrics.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape the RenderTrust application /metrics endpoint
  - job_name: "rendertrust-app"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: "rendertrust-api"

  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
