#
# RenderTrust Coolify Production Docker Compose
#
# This compose file is designed for deployment via Coolify (self-hosted PaaS).
# Coolify injects its own networking and proxy layer, so this file focuses on
# service definitions, healthchecks, and inter-service dependencies.
#
# Usage:
#   1. Import this file into Coolify as a Docker Compose project
#   2. Configure environment variables in Coolify UI (see env.template)
#   3. Deploy via Coolify dashboard
#
# Related tickets:
#   - REN-115: Coolify project setup
#   - REN-116: Cloudflare Tunnel integration (separate story)
#   - REN-120: Prometheus monitoring (separate story)

services:
  # ── FastAPI Application ──────────────────────────────────────────
  app:
    build:
      context: ../..
      dockerfile: ci/coolify/Dockerfile.prod
    ports:
      - "8000:8000"
    environment:
      # These are fallback defaults. In production, set all values
      # via Coolify UI environment variables (see env.template).
      APP_ENV: production
      APP_DEBUG: "false"
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      # Database and Redis URLs point to companion services by default.
      # Override in Coolify if using external managed services.
      DATABASE_URL: "postgresql+asyncpg://rendertrust:${POSTGRES_PASSWORD}@db:5432/rendertrust"
      REDIS_URL: "redis://redis:6379/0"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rendertrust-net
    restart: unless-stopped
    # Resource limits -- uncomment and adjust for your Hetzner VPS.
    # Coolify may also enforce limits via its UI.
    # deploy:
    #   resources:
    #     limits:
    #       memory: 1024M
    #       cpus: "1.0"
    #     reservations:
    #       memory: 512M
    #       cpus: "0.5"

  # ── PostgreSQL 16 ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rendertrust
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: rendertrust
      # Performance tuning -- conservative defaults for 4GB VPS.
      # Adjust based on workload after monitoring is in place (REN-120).
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rendertrust -d rendertrust"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - rendertrust-net
    restart: unless-stopped
    # Resource limits -- uncomment and adjust for your Hetzner VPS.
    # deploy:
    #   resources:
    #     limits:
    #       memory: 1024M
    #       cpus: "1.0"
    #     reservations:
    #       memory: 256M
    #       cpus: "0.25"

  # ── Redis 7 (Cache & Job Queue) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - rendertrust-net
    restart: unless-stopped
    # Resource limits -- uncomment and adjust for your Hetzner VPS.
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    #       cpus: "0.5"
    #     reservations:
    #       memory: 128M
    #       cpus: "0.1"

volumes:
  # Named volumes persist across container restarts and redeployments.
  # Coolify manages volume lifecycle; back up postgres_data regularly.
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  rendertrust-net:
    driver: bridge
